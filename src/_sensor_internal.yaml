substitutions:
  SENSOR_NAME_PM_1_0: "Air PM1.0 (ultra-fine particles)"
  SENSOR_NAME_PM_2_5: "Air PM2.5 (fine particles)"
  SENSOR_NAME_PM_4_0: "Air PM4.0 (small particles)"
  SENSOR_NAME_PM_10_0: "Air PM10.0 (dust)"
  SENSOR_NAME_TEMPERATURE: "Temperature"
  SENSOR_NAME_HUMIDITY: "Humidity"
  SENSOR_NAME_VOC: "VOC"
  SENSOR_NAME_NOX: "NOX"
  SENSOR_UPDATE_INTERVAL: "0s"

esphome:
  devices:
    - id: device_sensor
      name: "Sensor"

globals:
  - id: pm_sensor_active_source
    type: uint8_t
    restore_value: true
    initial_value: '0'

web_server:
  sorting_groups:
    - id: sorting_group_sensor
      name: "Sensor"
      sorting_weight: 11

# --- PM inlet placeholders (do not rename) ---
sensor:
  - platform: template
    id: sensor_pm_1_0_in
    internal: true
    update_interval: never

  - platform: template
    id: sensor_pm_2_5_in
    internal: true
    update_interval: never

  - platform: template
    id: sensor_pm_4_0_in
    internal: true
    update_interval: never

  - platform: template
    id: sensor_pm_10_0_in
    internal: true
    update_interval: never
  
  - platform: template
    id: sensor_voc_in
    internal: true
    update_interval: never

  - platform: template
    id: sensor_nox_in
    internal: true
    update_interval: never

  - platform: template
    id: sensor_temperature_in
    internal: true
    update_interval: never

  - platform: template
    id: sensor_humidity_in
    internal: true
    update_interval: never

# --- Aggregated public sensors ---
  - platform: template
    name: ${SENSOR_NAME_PM_1_0}
    id: sensor_pm_1_0
    unit_of_measurement: "µg/m³"
    accuracy_decimals: 1
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    update_interval: never
    state_class: measurement
    lambda: return NAN;

  - platform: template
    name: ${SENSOR_NAME_PM_2_5}
    id: sensor_pm_2_5
    unit_of_measurement: "µg/m³"
    accuracy_decimals: 1
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    update_interval: never
    state_class: measurement
    lambda: return NAN;

  - platform: template
    name: ${SENSOR_NAME_PM_4_0}
    id: sensor_pm_4_0
    unit_of_measurement: "µg/m³"
    accuracy_decimals: 1
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    update_interval: never
    state_class: measurement
    lambda: return NAN;

  - platform: template
    name: ${SENSOR_NAME_PM_10_0}
    id: sensor_pm_10_0
    unit_of_measurement: "µg/m³"
    accuracy_decimals: 1
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    update_interval: never
    state_class: measurement
    lambda: return NAN;

  - platform: template
    name: ${SENSOR_NAME_VOC}
    id: sensor_voc
    unit_of_measurement: "ppb"
    accuracy_decimals: 0
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    update_interval: never
    state_class: measurement
    lambda: return NAN;

  - platform: template
    name: ${SENSOR_NAME_NOX}
    id: sensor_nox
    unit_of_measurement: "ppb"
    accuracy_decimals: 0
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    update_interval: never
    state_class: measurement
    lambda: return NAN;

  - platform: template
    name: ${SENSOR_NAME_TEMPERATURE}
    id: sensor_temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    update_interval: never
    lambda: return NAN;

  - platform: template
    name: ${SENSOR_NAME_HUMIDITY}
    id: sensor_humidity
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: humidity
    state_class: measurement
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    update_interval: never
    lambda: return NAN;

  - platform: aqi
    name: "CAQI (EU)"
    id: sensor_caqi_value
    device_class: aqi
    icon: mdi:air-filter
    accuracy_decimals: 1
    state_class: measurement
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    pm_2_5: sensor_pm_2_5_in
    pm_10_0: sensor_pm_10_0_in
    calculation_type: CAQI

  - platform: aqi
    name: "AQI (US)"
    id: sensor_aqi_value
    device_class: aqi
    icon: mdi:air-filter
    accuracy_decimals: 1
    state_class: measurement
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    pm_2_5: sensor_pm_2_5_in
    pm_10_0: sensor_pm_10_0_in
    calculation_type: AQI
    on_value:
      - text_sensor.template.publish:
          id: sensor_aqi_category
          state: !lambda |-
            if (isnan(x))      return {"?"};
            if (x <= 10.0f)    return {"Great"};
            if (x <= 50.0f)    return {"Good"};
            if (x <= 100.0f)   return {"Moderate"};
            if (x <= 150.0f)   return {"Bad"};
            if (x <= 200.0f)   return {"Unhealthy"};
            if (x <= 300.0f)   return {"Extreme"};
            return {"Hazardous"};

text_sensor:
  - platform: template
    id: sensor_aqi_category
    name: "AQI Category"
    icon: mdi:information
    update_interval: never
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor

  - platform: template
    id: sensor_pm_source
    name: "PM sensor source"
    icon: mdi:connection
    update_interval: never
    device_id: device_sensor
    web_server:
      sorting_group_id: sorting_group_sensor
    lambda: return {"auto"};

script:
  - id: update_pm_data_outputs
    mode: restart
    then:
      - lambda: |-
          auto publish_if_changed = [](esphome::sensor::Sensor *input, esphome::sensor::Sensor *output) {
            const float value = input->state;
            if (!output->has_state() || output->state != value) {
              output->publish_state(value);
            }
          };

          publish_if_changed(id(sensor_pm_1_0_in), id(sensor_pm_1_0));
          publish_if_changed(id(sensor_pm_2_5_in), id(sensor_pm_2_5));
          publish_if_changed(id(sensor_pm_4_0_in), id(sensor_pm_4_0));
          publish_if_changed(id(sensor_pm_10_0_in), id(sensor_pm_10_0));
          publish_if_changed(id(sensor_voc_in), id(sensor_voc));
          publish_if_changed(id(sensor_nox_in), id(sensor_nox));
          publish_if_changed(id(sensor_temperature_in), id(sensor_temperature));
          publish_if_changed(id(sensor_humidity_in), id(sensor_humidity));

          const uint8_t source = id(pm_sensor_active_source);
          const char *label = "auto";
          switch (source) {
            case 1: label = "PMSX003"; break;
            case 2: label = "Sensirion SEN5x"; break;
            case 3: label = "Manual override"; break;
            default: label = "auto"; break;
          }
          id(sensor_pm_source).publish_state(label);
