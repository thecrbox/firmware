esphome:
  on_boot:
    - priority: 900
      then:
        - script.execute: _network_update_state

wifi:
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password
  fast_connect: false
  power_save_mode: none

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ap_timeout: 0s

  reboot_timeout: 5min
  id: mywifi

  on_connect:
    then:
      - script.execute: wifi_on_connected

captive_portal:

esp32_ble:
  id: myble
  io_capability: none
  disable_bt_logs: true  # Default, saves flash
  #max_connections: 1  # Default, total BLE connections
  enable_on_boot: true

esp32_improv:
  id: myimprov
  authorizer: none
  on_provisioned:
    then:
      - script.execute: _network_on_provisioned

api:
  id: myapi
#  encryption:
#    key: !secret api_key
  # home assistant is not needed for everyone, so let's disable by default
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_pass

web_server:
  port: 80
  version: 3
  local: false
  id: mywebserver
#  auth:
#    username:  !secret webserver_user
#    password: !secret webserver_pass

http_request:
  id: network_http_client
  useragent: "${device_name} timezone/1.0"
  timeout: 10s

globals:
  - id: network_hotspot_active
    type: bool
    restore_value: true
    initial_value: 'true'
  - id: network_offline_mode
    type: bool
    restore_value: true
    initial_value: 'false'

script:
  - id: _network_on_provisioned
    then:
      - logger.log:
          level: INFO
          format: "Network: _network_on_provisioned called"
      - lambda: |-
          id(network_hotspot_active) = false;
          global_preferences->sync();
      - script.execute: ui_force_post_provision
      - delay: 3000ms
      - switch.turn_on: device_restart_switch

  - id: _network_update_state
    then:
      - if:
          condition:
            lambda: 'return id(network_offline_mode);'
          then:
            - logger.log:
                level: INFO
                format: "Network: should be offline, disabling Wi-Fi"
            - wifi.disable
            - lambda: |-
                ui::set_offline_mode(true);
          else:
            - logger.log:
                level: INFO
                format: "Network: should be online, enabling Wi-Fi"
            - wifi.enable
            - lambda: |-
                ui::set_offline_mode(false);

  - id: network_set_offline
    then:
      - if:
          condition:
            lambda: 'return id(network_offline_mode);'
          then:
            - logger.log:
                level: ERROR
                format: "Network: already offline"
          else:
            - logger.log:
                level: INFO
                format: "Network: going offline"
            - lambda: |-
                id(network_offline_mode) = true;
                id(network_hotspot_active) = false;
                global_preferences->sync();
            - script.execute: _network_update_state
            - script.execute: ui_show_offline_mode_banner

  - id: network_set_online
    then:
      - if:
          condition:
            lambda: 'return id(network_offline_mode);'
          then:
            - logger.log:
                level: INFO
                format: "Network: going online"
            - lambda: |-
                id(network_offline_mode) = false;
                global_preferences->sync();
            - script.execute: _network_update_state
          else:
            - logger.log:
                level: ERROR
                format: "Network: already online"

  - id: network_set_hotspot
    then:
      - logger.log:
          level: INFO
          format: "Network: disabling station mode, restarting to enable hotspot"
      - script.execute: network_set_online

      - lambda: |-
          id(network_hotspot_active) = true;
          global_preferences->sync();
      - button.press: factory_reset_btn

  - id: wifi_on_connected
    then:
      - logger.log:
          level: INFO
          format: "Network: wifi_on_connected"
      - lambda: |-
          id(myble).disable();
      - if:
          condition:
            lambda: 'return id(network_hotspot_active);'
          then:
            - script.execute: _network_on_provisioned
          else:
            - logger.log:
                level: INFO
                format: "Network: hotspot was not active, no restart needed"
#      - script.execute: network_refresh_timezone

  - id: network_refresh_timezone
    mode: restart
    then:
      - logger.log:
          level: INFO
          format: "Network: refreshing timezone from geolocation"
      - http_request.get:
          id: network_http_client
          url: http://ip-api.com/json/?fields=status,message,timezone,lat,lon
          on_response:
            then:
              - lambda: |-
                  auto container = response;
                  const char *const TAG = "network";
                  ESP_LOGI(TAG, "Timezone lookup HTTP %d", container->status_code);
                  if (container->status_code != 200) {
                    ESP_LOGW(TAG, "Timezone lookup failed with HTTP status %d", container->status_code);
                    return;
                  }
                  std::string timezone;
                  bool parsed = esphome::json::parse_json(body, [&](JsonObject root) -> bool {
                    const char *status = root["status"].as<const char *>();
                    if (status == nullptr) {
                      ESP_LOGW(TAG, "Timezone service returned payload without status");
                      return false;
                    }
                    const std::string status_str(status);
                    if (status_str != "success") {
                      if (root["message"].is<const char *>()) {
                        ESP_LOGW(TAG, "Timezone service error: %s", root["message"].as<const char *>());
                      } else {
                        ESP_LOGW(TAG, "Timezone service returned unexpected payload");
                      }
                      return false;
                    }
                    if (!root["timezone"].is<const char *>()) {
                      ESP_LOGW(TAG, "Timezone service did not provide a timezone field");
                      return false;
                    }
                    timezone = root["timezone"].as<std::string>();
                    return true;
                  });
                  if (!parsed || timezone.empty()) {
                    ESP_LOGW(TAG, "Failed to parse timezone from geolocation response");
                    return;
                  }
                  id(mysntp).set_timezone(timezone);
                  id(mysntp).update();
                  ESP_LOGI(TAG, "Timezone updated to %s", timezone.c_str());
          on_error:
            then:
              - logger.log:
                  level: WARN
                  format: "Network: timezone lookup request failed"
