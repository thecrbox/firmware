wifi:
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password
  fast_connect: false
  power_save_mode: NONE

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ap_timeout: 0s

  id: mywifi

  on_connect:
    then:
      - script.execute: wifi_on_connected

  on_disconnect:
    then:
      - script.execute: wifi_on_disconnected


  # prevents reboot every 15min when wifi is down
  # reboot_timeout: 0

captive_portal:

# this MAY be great, but it causes some random crashes (oom?) when enabled with the rest of the system
# TODO: can we enable it onlyu when provisioning (network_hotspot_active=true), and disable after?
#esp32_improv:
#  id: myimprov
#  authorizer: button_encoder
#  on_provisioned:
#    then:
#      - logger.log: "Provisioned via Improv"
#      - delay: 500ms
#      - lambda: 'ESP_LOGI("IMPROV", "Restarting after provisioning"); App.safe_reboot();'

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_pass

web_server:
  port: 80
  version: 3
  local: true
  id: mywebserver
#  auth:
#    username:  !secret webserver_user
#    password: !secret webserver_pass

globals:
  - id: network_hotspot_active
    type: bool
    restore_value: true
    initial_value: 'true'

script:
  - id: network_switch_to_hotspot
    then:
      - logger.log:
          level: INFO
          format: "Network: disabling station mode, restarting to enable hotspot"

      - lambda: |-
          id(network_hotspot_active) = true;
          global_preferences->sync();
      - button.press: factory_reset_btn

#      - lambda: |-
#          id(mywifi).disable();
#          id(mywebserver).teardown();
#          id(mywifi).clear_sta();
#          id(mywifi).set_ap_timeout(1);
#          id(mywifi).enable();
#
#          if (captive_portal::global_captive_portal != nullptr) {
#            ESP_LOGI("Network", "Network: stopping captive portal");
#            captive_portal::global_captive_portal->end();
#            ESP_LOGI("Network", "Network: starting captive portal");
#            captive_portal::global_captive_portal->start();
#          } else {
#            ESP_LOGW("Network", "Network: captive portal is null!");
#          }

  - id: wifi_on_connected
    then:
      - logger.log:
          level: INFO
          format: "Network: wifi_on_connected"
      - if:
          condition:
            lambda: 'return id(network_hotspot_active);'
          then:
            - logger.log:
                level: INFO
                format: "Network: hotspot not needed anymore, disabling"
            - lambda: |-
                id(network_hotspot_active) = false;
                global_preferences->sync();
            - script.execute: ui_force_post_provision
            - delay: 3000ms
            - switch.turn_on: device_restart_switch
          else:
            - logger.log:
                level: INFO
                format: "Network: hotspot was not active, no restart needed"

  - id: wifi_on_disconnected
    then:
      - logger.log:
          level: WARN
          format: "Network: wifi_on_disconnected"
#      - lambda: |-
#          ESP_LOGI("Network", "Network: starting mywebserver setup");
#          id(mywebserver).setup();