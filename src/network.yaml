esphome:
  on_boot:
    priority: 900
    then:
      - script.execute: network_apply_offline_state

wifi:
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password
  fast_connect: false
  power_save_mode: NONE

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ap_timeout: 0s

  reboot_timeout: 5min

  id: mywifi

  on_connect:
    then:
      - script.execute: wifi_on_connected

  on_disconnect:
    then:
      - script.execute: wifi_on_disconnected



captive_portal:

# this MAY be great, but it causes some random crashes (oom?) when enabled with the rest of the system
# TODO: can we enable it onlyu when provisioning (network_hotspot_active=true), and disable after?
esp32_improv:
  id: myimprov
  authorizer: none
  on_provisioned:
    then:
      - logger.log:
          level: INFO
          format: "Network: provisioned, disabling hotspot and restarting"
      - lambda: |-
          id(network_hotspot_active) = false;
          global_preferences->sync();
      - script.execute: ui_force_post_provision
      - delay: 3000ms
      - switch.turn_on: device_restart_switch

api:
  id: myapi
  encryption:
    key: !secret api_key
  # home assistant is not needed for everyone, so let's disable by default
  reboot_timeout: 0s




ota:
  - platform: esphome
    password: !secret ota_pass

web_server:
  port: 80
  version: 3
  local: true
  id: mywebserver
#  auth:
#    username:  !secret webserver_user
#    password: !secret webserver_pass

globals:
  - id: network_hotspot_active
    type: bool
    restore_value: true
    initial_value: 'true'
  - id: network_offline_mode
    type: bool
    restore_value: true
    initial_value: 'false'

switch:
  - platform: template
    name: "Work offline"
    id: network_offline_mode_switch
    icon: "mdi:wifi-off"
    device_id: device_interface
    lambda: 'return id(network_offline_mode);'
    turn_on_action:
      - script.execute: network_enable_offline_mode
    turn_off_action:
      - script.execute: network_disable_offline_mode
    web_server:
      sorting_group_id: sorting_group_interface
      sorting_weight: -10

script:
  - id: network_apply_offline_state
    then:
      - if:
          condition:
            lambda: 'return id(network_offline_mode);'
          then:
            - logger.log:
                level: INFO
                format: "Network: offline mode active, disabling Wi-Fi"
            - wifi.disable
            - lambda: |-
                ui::set_offline_mode(true);
          else:
            - logger.log:
                level: INFO
                format: "Network: offline mode inactive, enabling Wi-Fi"
            - wifi.enable
            - lambda: |-
                ui::set_offline_mode(false);

  - id: network_enable_offline_mode
    then:
      - if:
          condition:
            lambda: 'return id(network_offline_mode);'
          then:
            - logger.log:
                level: DEBUG
                format: "Network: offline mode already enabled"
          else:
            - logger.log:
                level: INFO
                format: "Network: enabling offline mode"
            - lambda: |-
                id(network_offline_mode) = true;
                id(network_hotspot_active) = false;
                global_preferences->sync();
            - script.execute: network_apply_offline_state
            - script.execute: ui_show_offline_mode

  - id: network_disable_offline_mode
    then:
      - if:
          condition:
            lambda: 'return id(network_offline_mode);'
          then:
            - logger.log:
                level: INFO
                format: "Network: disabling offline mode"
            - lambda: |-
                id(network_offline_mode) = false;
                global_preferences->sync();
            - script.execute: network_apply_offline_state
          else:
            - logger.log:
                level: DEBUG
                format: "Network: offline mode already disabled"

  - id: network_switch_to_hotspot
    then:
      - logger.log:
          level: INFO
          format: "Network: disabling station mode, restarting to enable hotspot"
      - script.execute: network_disable_offline_mode

      - lambda: |-
          id(network_hotspot_active) = true;
          global_preferences->sync();
      - button.press: factory_reset_btn

  - id: wifi_on_connected
    then:
      - logger.log:
          level: INFO
          format: "Network: wifi_on_connected"
      - if:
          condition:
            lambda: 'return id(network_hotspot_active);'
          then:
            - logger.log:
                level: INFO
                format: "Network: hotspot not needed anymore, disabling"
            - lambda: |-
                id(network_hotspot_active) = false;
                global_preferences->sync();
            - script.execute: ui_force_post_provision
            - delay: 3000ms
            - switch.turn_on: device_restart_switch
          else:
            - logger.log:
                level: INFO
                format: "Network: hotspot was not active, no restart needed"

  - id: wifi_on_disconnected
    then:
      - logger.log:
          level: WARN
          format: "Network: wifi_on_disconnected"
#      - lambda: |-
#          ESP_LOGI("Network", "Network: starting mywebserver setup");
#          id(mywebserver).setup();