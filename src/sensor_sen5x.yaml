sensor:
  - platform: sen5x
    id: sen55
    i2c_id: ${SENSOR_SENSIRON_BUS_ID}
    pm_1_0:
      name: "${SENSOR_NAME_PM_1_0} (SEN5x)"
      id: sensor_pm_1_0_sen5x
      device_id: device_sensor
      internal: true
      accuracy_decimals: 1
      web_server:
        sorting_group_id: sorting_group_sensor
      filters:
        - throttle_average: 10s
        - heartbeat: 10s
        - filter_out: nan
        - skip_initial: 3
      on_raw_value:
        then:
          # TODO: fix pm_sensor_active_source magic numbers; it's unreadable; figure out better way to update active sensor (a lot in this file)
          - lambda: |-
              id(sensor_pm_1_0_in).publish_state(x);
              id(pm_sensor_active_source) = 2;
          - script.execute: update_pm_data_outputs
