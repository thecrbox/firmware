esphome:
  includes:
    - src/ui_draw.h
  on_boot:
    priority: -100
    then:
      - delay: 0s
      - if:
          condition:
            lambda: 'return id(network_hotspot_active);'
          then:
            - script.execute: ui_force_setup_mode

i2c:
  - id: bus_a
    sda: ${UI_DISPLAY_I2C_SDA}
    scl: ${UI_DISPLAY_I2C_SCL}
    scan: false
    frequency: 400kHz

globals:
  - id: ui_tick_auto_idle
    type: int
    restore_value: false
    initial_value: '0'
  - id: ui_tick_manual_idle
    type: int
    restore_value: false
    initial_value: '0'
  - id: ui_tick_screen_dim
    type: int
    restore_value: false
    initial_value: '0'
  - id: ui_inputs_locked
    type: bool
    restore_value: false
    initial_value: 'false'

interval:
#  - interval: 10s
#    then:
#      - lambda: |-
#          id(oled).request_dump();

  - interval: 100ms
    then:
      - script.execute: ui_tick

script:
  - id: ui_tick
    then:
      - lambda: |-
          ui::set_offline_mode(id(network_offline_mode));

          if (id(ui_inputs_locked)) {
            ESP_LOGD("UI", "ui_tick: ignoring, inputs locked");
            return;
          }
          
          auto fn_idler_auto = []() {
            id(focus_auto_config).make_call().set_option("idle").perform();
            id(ui_tick_auto_idle) = ${UI_TICKS_TO_GO_IDLE};
          };
          
          auto fn_idler_manual = []() {
            id(focus_manual).make_call().set_option("idle").perform();
            id(ui_tick_manual_idle) = ${UI_TICKS_TO_GO_IDLE};
          };
          
          auto fn_idler_screen_dim = []() {
            ESP_LOGI("UI", "Dimming screen");
            id(oled).set_contrast(0.02f);
            id(oled).set_brightness(0.02f);
            id(ui_tick_screen_dim) = ${UI_TICKS_TO_SCREEN_DIM};
          };
          
          if (id(ui_tick_screen_dim) < ${UI_TICKS_TO_SCREEN_DIM}) {
            id(ui_tick_screen_dim) += 1;
            if (id(ui_tick_screen_dim) >= ${UI_TICKS_TO_SCREEN_DIM}) {
              fn_idler_screen_dim();
            }
          }
          
          if (id(ui_mode_select).state == "AUTO") {
            fn_idler_manual();
            if (id(ui_tick_auto_idle) < ${UI_TICKS_TO_GO_IDLE}) {
              id(ui_tick_auto_idle) += 1;
              if (id(ui_tick_auto_idle) >= ${UI_TICKS_TO_GO_IDLE}) {
                fn_idler_auto();
                id(ui_focus_update_auto).execute();
              }
            }
          } else if (id(ui_mode_select).state == "MANUAL") {
            fn_idler_auto();
            if (id(ui_tick_manual_idle) < ${UI_TICKS_TO_GO_IDLE}) {
              id(ui_tick_manual_idle) += 1;
              if (id(ui_tick_manual_idle) >= ${UI_TICKS_TO_GO_IDLE}) {
                fn_idler_manual();
              }
            }
          } else if (id(ui_mode_select).state == "OFF") {
            fn_idler_manual();
            fn_idler_auto();
          }

  - id: ui_brigthness_normal
    then:
      - lambda: |-
          id(oled).set_contrast(1.0f);
          id(oled).set_brightness(1.0f);

  - id: ui_on_not_idle
    then:
      - lambda: |-
          ESP_LOGI("UI", "ui_on_not_idle; ui_mode_select='%s'", id(ui_mode_select).state.c_str());
          id(ui_tick_auto_idle) = 0;
          id(ui_tick_manual_idle) = 0;
          id(ui_tick_screen_dim) = 0;
      - script.execute: ui_brigthness_normal

  # short click - toggle focus
  - id: ui_on_click
    then:
      - if:
          condition:
            lambda: 'return id(ui_inputs_locked);'
          then:
            - lambda: |-
                if (id(network_hotspot_active)) {
                  ESP_LOGI("UI", "ui_on_click; provisioning intro active, ignoring click");
                } else {
                  ESP_LOGI("UI", "ui_on_click; ignoring while inputs locked");
                }
          else:
            - logger.log:
                level: INFO
                format: "UI: ui_on_click; toggling focus"
            - if:
                condition:
                  lambda: 'return id(ui_mode_select).state == "AUTO";'
                then:
                  - logger.log:
                      level: INFO
                      format: "UI: ui_on_click; toggling focus AUTO"
                  - lambda: |-
                      auto current = id(focus_auto_config).state;
                      const char *next = nullptr;
                      if (current == "idle") {
                        next = "config_auto_preview";
                      } else if (current == "config_auto_preview") {
                        next = "config_auto_day_time";
                      } else if (current == "config_auto_day_time") {
                        next = "config_auto_day_fan";
                      } else if (current == "config_auto_day_fan") {
                        next = "config_auto_day_rgb";
                      } else if (current == "config_auto_day_rgb") {
                        next = "config_auto_night_time";
                      } else if (current == "config_auto_night_time") {
                        next = "config_auto_night_fan";
                      } else if (current == "config_auto_night_fan") {
                        next = "config_auto_night_rgb";
                      } else {
                        next = "idle";
                      }
                      id(focus_auto_config).make_call().set_option(next).perform();
                      id(ui_focus_update_auto).execute();
                  - script.execute: ui_on_not_idle
            - if:
                condition:
                  - lambda: 'return id(ui_mode_select).state == "MANUAL";'
                then:
                  - logger.log:
                      level: INFO
                      format: "UI: ui_on_click; toggling focus MANUAL"
                  - select.next: focus_manual
            - if:
                condition:
                  - lambda: 'return id(ui_mode_select).state == "OFF";'
                then:
                  - logger.log:
                      level: INFO
                      format: "UI: ui_on_click; toggling focus OFF"
                  - select.next: focus_off

  # long click - toggle mode
  - id: ui_on_long_click
    then:
      - if:
          condition:
            lambda: 'return id(ui_inputs_locked);'
          then:
            - logger.log:
                level: INFO
                format: "UI: ui_on_long_click; ignoring while inputs locked"
          else:
            - logger.log:
                level: INFO
                format: "UI: ui_on_long_click; toggling mode"
            - script.execute: ui_on_not_idle
            - select.next: ui_mode_select

  # very long click - force setup mode
  - id: ui_force_setup_mode
    then:
      - logger.log:
          level: INFO
          format: "UI: ui_force_setup_mode; forcing provisioning mode"
      - lambda: |-
          id(ui_inputs_locked) = true;
          id(page_init).show();

  - id: ui_force_post_provision
    then:
      - logger.log:
          level: INFO
          format: "UI: starting post-provisioning hold"
      - script.execute: ui_brigthness_normal
      - lambda: |-
          id(ui_inputs_locked) = true;
          id(page_init).show();

  - id: ui_show_offline_mode_banner
    then:
      - logger.log:
          level: INFO
          format: "UI: showing offline mode banner"
      - script.execute: ui_brigthness_normal
      - lambda: |-
          id(ui_inputs_locked) = true;
          id(page_init).show();
      - delay: 3s
      - lambda: |-
          id(ui_inputs_locked) = false;
      - script.execute: ui_display_mode_page

  - id: ui_on_rotate
    mode: queued
    parameters:
      dir: int     # +1 = right, -1 = left
    then:
      - if:
          condition:
            lambda: 'return id(ui_inputs_locked);'
          then:
            - lambda: |-
                ESP_LOGI("UI", "ui_on_rotate; ignoring while inputs locked");
          else:
            - logger.log:
                level: INFO
                format: "UI: ui_on_rotate;"
            - script.execute: ui_on_not_idle
            - lambda: |-
                // helper to advance a template select one step
                auto select_next = [](auto &sel) {
                  sel->make_call().select_next(true).perform();
                };

                auto select_previous = [](auto &sel) {
                  sel->make_call().select_previous(true).perform();
                };

                const int step = (dir > 0 ? +${UI_ENCODER_STEP} : -${UI_ENCODER_STEP});

                if (id(ui_mode_select).state == "AUTO") {
                  if (id(focus_auto_config).state == "idle") {
                    if (dir > 0) {
                      select_next(id(focus_sensors));
                    } else {
                      select_previous(id(focus_sensors));
                    }
                  } else if (id(focus_auto_config).state == "config_auto_preview") {
                    id(focus_auto_config).make_call().set_option("idle").perform();
                    id(ui_focus_update_auto).execute();
                  } else if (id(focus_auto_config).state == "config_auto_night_time") {
                    id(ui_shift_time_30m).execute(false, dir);
                  } else if (id(focus_auto_config).state == "config_auto_night_fan") {
                    id(cfg_fan_auto_night).make_call()
                      .set_value(std::clamp(id(cfg_fan_auto_night).state + step, 0.0f, 100.0f)).perform();
                    PID::Instance().Control();
                  } else if (id(focus_auto_config).state == "config_auto_night_rgb") {
                    id(cfg_brightness_auto_night).make_call()
                      .set_value(std::clamp(id(cfg_brightness_auto_night).state + step, 0.0f, 100.0f)).perform();
                  } else if (id(focus_auto_config).state == "config_auto_day_time") {
                    id(ui_shift_time_30m).execute(true, dir);
                  } else if (id(focus_auto_config).state == "config_auto_day_fan") {
                    id(cfg_fan_auto_day).make_call()
                      .set_value(std::clamp(id(cfg_fan_auto_day).state + step, 0.0f, 100.0f)).perform();
                    PID::Instance().Control();
                  } else if (id(focus_auto_config).state == "config_auto_day_rgb") {
                    id(cfg_brightness_auto_day).make_call()
                      .set_value(std::clamp(id(cfg_brightness_auto_day).state + step, 0.0f, 100.0f)).perform();
                  }
                } else if (id(ui_mode_select).state == "MANUAL") {
                  if (id(focus_manual).state == "idle") {
                    if (dir > 0) {
                      select_next(id(focus_sensors));
                    } else {
                      select_previous(id(focus_sensors));
                    }
                  } else if (id(focus_manual).state == "config_manual_fan") {
                    id(cfg_fan_manual).make_call()
                      .set_value(std::clamp(id(cfg_fan_manual).state + step, 0.0f, 100.0f)).perform();
                    PID::Instance().Control();
                  } else if (id(focus_manual).state == "config_manual_rgb") {
                    id(cfg_brightness_manual).make_call()
                      .set_value(std::clamp(id(cfg_brightness_manual).state + step, 0.0f, 100.0f)).perform();
                  }
                } else if (id(ui_mode_select).state == "OFF") {
                  select_next(id(focus_off));
                }
          

  - id: ui_shift_time_30m
    mode: single
    parameters:
      day: bool   # false = night, true = day
      dir: int    # +1 next, -1 prev
    then:
      - lambda: |-
          int total;
          int mod;
          int second = 0;
          if (day) {
            auto t = id(cfg_auto_time_day).state_as_esptime();
            total = int(t.hour) * 60 + int(t.minute);
            mod = t.minute % 30;
            second = t.second;
          } else {
            auto t = id(cfg_auto_time_night).state_as_esptime();
            total = int(t.hour) * 60 + int(t.minute);
            mod = t.minute % 30;
            second = t.second;
          }

          if (dir >= 0) {
            // Next :00/:30 (1–30 min forward)
            int bump = (mod == 0 && second == 0) ? 30 : (30 - mod);
            total = (total + bump) % (24 * 60);
          } else {
            // Previous :00/:30 (1–30 min back)
            int back = (mod == 0 && second == 0) ? 30 : mod;
            total -= back;
            if (total < 0) total += 24 * 60;
          }

          char buf[9];
          snprintf(buf, sizeof(buf), "%02d:%02d:00", total / 60, total % 60);

          if (day) {
            id(cfg_auto_time_day).make_call().set_time(buf).perform();
          } else {
            id(cfg_auto_time_night).make_call().set_time(buf).perform();
          }
  - id: ui_focus_update_auto
    then:
      - lambda: |-
          if (id(ui_inputs_locked)) {
            ESP_LOGI("UI", "ui_focus_update_auto: inputs locked, skipping focus update");
            return;
          }

          auto focus_state = id(focus_auto_config).state;
          if (focus_state == "idle") {
            ESP_LOGI("UI", "focus auto IDLE, switching to idle page");
            id(page_auto).show();
            return;
          }

          if (focus_state == "config_auto_preview") {
            ESP_LOGI("UI", "focus auto PREVIEW, showing preview page");
            id(page_auto_preview).show();
            return;
          }

          bool known_state = (
            focus_state == "config_auto_day_time" ||
            focus_state == "config_auto_day_fan" ||
            focus_state == "config_auto_day_rgb" ||
            focus_state == "config_auto_night_time" ||
            focus_state == "config_auto_night_fan" ||
            focus_state == "config_auto_night_rgb"
          );

          if (!known_state) {
            ESP_LOGW("UI", "focus auto unknown state '%s', resetting to idle", focus_state.c_str());
            id(focus_auto_config).make_call().set_option("idle").perform();
            id(page_auto).show();
            return;
          }

          ESP_LOGI("UI", "focus auto CONFIG '%s', showing config page", focus_state.c_str());
          id(page_auto_config).show();

  - id: ui_display_mode_page
    then:
      - lambda: |-
          if (id(ui_inputs_locked)) {
            ESP_LOGI("UI", "ui_display_mode_page: inputs locked, skipping page update");
            return;
          }

          if (id(ui_mode_select).state == "AUTO") {
            id(ui_focus_update_auto).execute();
          } else if (id(ui_mode_select).state == "MANUAL") {
            id(page_manual).show();
          } else if (id(ui_mode_select).state == "OFF") {
            id(page_off).show();
          }

select:
  - platform: template
    name: "UI: Interface Mode"
    id: ui_mode_select
    device_id: device_interface
    web_server:
      sorting_group_id: sorting_group_interface
    optimistic: true
    internal: true
    restore_value: true
    options:
      - "OFF"
      - "AUTO"
      - "MANUAL"
    on_value:
      then:
        - lambda: |-
            if (!id(ui_inputs_locked)) {
              ESP_LOGI("UI", "ui_mode_select.on_value, ui_mode_select='%s'; i='%d'", id(ui_mode_select).state.c_str(), i);
              id(ui_display_mode_page).execute();
            } else {
              ESP_LOGI("UI", "ui_mode_select.on_value: UI locked, deferring page update");
            }

  - platform: template
    name: "UI: Focus AUTO config"
    id: focus_auto_config
    device_id: device_interface
    optimistic: true
    internal: true
    restore_value: false
    options:
      - "idle"
      - "config_auto_preview"
      - "config_auto_day_time"
      - "config_auto_day_fan"
      - "config_auto_day_rgb"
      - "config_auto_night_time"
      - "config_auto_night_fan"
      - "config_auto_night_rgb"
  - platform: template
    name: "UI: Focus QUALITY"
    id: focus_sensors
    device_id: device_interface
    optimistic: true
    internal: true
    restore_value: false
    options:
#      - "aqi"
      - "aqi2"
#      - "aqi3"
#      - "aqi4"
#      - "pm_1"
      - "pm_2_5"
#      - "pm_4_0"
#      - "pm_10_0"
      - "nox"
#      - "voc"
      - "temp_and_humidity"
      - "qr"
  - platform: template
    name: "UI: Focus MANUAL"
    id: focus_manual
    device_id: device_interface
    optimistic: true
    internal: true
    restore_value: false
    options:
      - "idle"
      - "config_manual_fan"
      - "config_manual_rgb"
  - platform: template
    name: "UI: Focus OFF"
    id: focus_off
    device_id: device_interface
    optimistic: true
    internal: true
    restore_value: false
    options:
      - "idle"

binary_sensor:
  - platform: gpio
    pin:
      number: ${UI_ENCODER_SW}
      inverted: true
      mode:
        input: true
    id: button_encoder
    name: "UI: Button"
    device_id: device_interface
    internal: true
    # TODO make special clicks (provision, force offline) more reliable / easier to use
    # maybe we don't need the very long click at all?
    on_multi_click:
      - timing:
          - ON for at least 10s
          - OFF for at least 0.05s
        then:
          - if:
              condition:
                lambda: 'return id(network_hotspot_active);'
              then:
                - logger.log:
                    level: INFO
                    format: "UI: ui_on_very_long_click; enabling offline mode"
                - script.execute: network_set_offline
              else:
                - logger.log:
                    level: DEBUG
                    format: "UI: ui_on_very_long_click; hotspot inactive, ignoring"
      - timing:
          - ON for 4s to 9.9s
          - OFF for at least 0.05s
        then:
          - script.execute: ui_force_setup_mode
          - script.execute: network_set_hotspot
      - timing:
          - ON for 0.3s to 3.9s
          - OFF for at least 0.05s
        then:
          - script.execute: ui_on_long_click
      - timing:
          - ON for at most 0.3s
          - OFF for at least 0.05s
        then:
          - script.execute: ui_on_click

sensor:
  - platform: rotary_encoder
    name: "UI: Encoder"
    id: encoder_value
    device_id: device_interface
    internal: true
    pin_a:
      number: ${UI_ENCODER_A}
      inverted: false
      mode:
        input: true
        pullup: false
        pulldown: false
    pin_b:
      number: ${UI_ENCODER_B}
      inverted: false
      mode:
        input: true
        pullup: false
        pulldown: false
    on_clockwise:
      then:
        - script.execute:
            id: ui_on_rotate
            dir: 1
    on_anticlockwise:
      then:
        - script.execute:
            id: ui_on_rotate
            dir: -1
    filters:
      - throttle: 0.20s

font:
  - file: "fonts/font_tiny5.bdf"
    id: f05_tiny
  - file: "fonts/tiny5-Regular.bdf"
    id: f05_tinyregular
  - file: "fonts/u8g2_squeezed_regular_6.bdf"
    id: f06_u8g2_squeezed

  # lucida 08
  - file: "fonts/luRS08.bdf"
    id: f08_lucidasans_regular
    glyphsets:
      - GF_Latin_Kernel
    glyphs: [µ,³]

  # lucida 10
  - file: "fonts/luRS10.bdf"
    id: f10_lucidasans_regular
  - file: "fonts/luBS10.bdf"
    id: f10_lucidasans_bold

qr_code:
  - id: provisioning_qr_code
    value: "WIFI:T:none;S:${device_name};"
    #value: "foo"
    ecc: LOW
  - id: device_ip_qr_code
    value: ""
    ecc: LOW

display:
  - platform: ${UI_DISPLAY_PLATFORM}
    model: ${UI_DISPLAY_TYPE}
    i2c_id: bus_a
    address: 0x3C
    id: oled
    update_interval: 200ms
    contrast: 100%
    brightness: 100%

    pages:
      - id: page_auto
        lambda: |-
          auto font_big    = id(f10_lucidasans_bold);
          auto font_value  = id(f10_lucidasans_regular);
          auto font_small  = id(f08_lucidasans_regular);
          auto font_tiny  = id(f06_u8g2_squeezed);
          using esphome::display::COLOR_ON;
          using esphome::display::TextAlign;

          auto t = id(mysntp).now();
          auto td = id(cfg_auto_time_day).state_as_esptime();
          auto tn = id(cfg_auto_time_night).state_as_esptime();          
          bool day_mode = true;
          if (td.hour < tn.hour || (td.hour == tn.hour && td.minute < tn.minute)) {
            // normal case: day starts before night
            day_mode = (t.hour > td.hour || (t.hour == td.hour && t.minute >= td.minute)) &&
                       (t.hour < tn.hour || (t.hour == tn.hour && t.minute < tn.minute));
          } else {
            // special case: day starts after night (overnight)
            day_mode = (t.hour > td.hour || (t.hour == td.hour && t.minute >= td.minute)) ||
                       (t.hour < tn.hour || (t.hour == tn.hour && t.minute < tn.minute));
          }
    
          // Header: AUTO + sun/moon
          ui::draw_mode_header_2icons_title_wifi(it, font_big, "AUTO", id(img_auto), day_mode ? id(img_sun) : id(img_moon));
    
          // Right-side icons
          const int x0 = ui::right_icon_x(0);
          const int x1 = ui::right_icon_x(1);
    
          const int bright = id(rgb_is_on)
                           ? ui::clamp_pct((int) (id(rgb_current_brightness) * 100.0f))
                           : 0;
          const int speed  = id(fans_speed).state ? ui::clamp_pct((int) id(fans_speed).speed) : 0;
    
          ui::draw_icon_and_value(it, x0, ui::Y_ICONS, id(img_light_on), font_small, bright);
          ui::draw_icon_and_value(it, x1, ui::Y_ICONS, id(img_fan_on),   font_small, speed);
          
          if (!ui::draw_focus_sensors(it, font_value, font_small, font_tiny)) {
            const int x3 = ui::right_icon_x(3);
            ui::draw_icon_and_text(it, x3, ui::Y_ICONS, id(img_wind),   font_small, "xxx");
            it.printf(x3 - ui::X_OFFSET_ICONS/2, ui::Y_ICONS, font_tiny, COLOR_ON, TextAlign::TOP_LEFT, "UNIMPLEMENTED");
          }

      - id: page_auto_config
        lambda: |-
          auto font_big   = id(f10_lucidasans_bold);
          auto font_small = id(f08_lucidasans_regular);

          ui::draw_header_2icons(it, id(img_auto), id(img_wrench));
          // Unlocked header hints: turn=edit, push=next
          ui::draw_hints_pair(it, id(img_turn_small), "edit", id(img_push_small), "next", font_small);
    
          bool day_mode = (id(focus_auto_config).state == "config_auto_day_time" ||
                           id(focus_auto_config).state == "config_auto_day_fan"  ||
                           id(focus_auto_config).state == "config_auto_day_rgb");
    
          int brightness = day_mode ? (int) id(cfg_brightness_auto_day).state
                                    : (int) id(cfg_brightness_auto_night).state;
          int fan        = day_mode ? (int) id(cfg_fan_auto_day).state
                                    : (int) id(cfg_fan_auto_night).state;
          auto t = day_mode ? id(cfg_auto_time_day).state_as_esptime()
                            : id(cfg_auto_time_night).state_as_esptime();
    
          // Bottom corner badge
          it.image(0, ui::H - ui::ICON - 19, day_mode ? id(img_sun) : id(img_moon), COLOR_ON);
    
          const int x0 = ui::right_icon_x(0);
          const int x1 = ui::right_icon_x(1);
          const int x2 = ui::right_icon_x(2);
    
          // focus marker + desc
          const int marker_y = ui::Y_ICONS + 1;
          int focus_idx = ui::focus_index_from_state(id(focus_auto_config).state.c_str());
          ui::draw_focus_marker(it, focus_idx, marker_y, id(img_arrow_right));
          ui::draw_focus_desc_auto(it, font_small, day_mode, focus_idx);
    
          // icon rows + time
          ui::draw_icon_and_value(it, x0, ui::Y_ICONS, id(img_light_on), font_small, brightness);
          ui::draw_icon_and_value(it, x1, ui::Y_ICONS, id(img_fan_on),   font_small, fan);
          it.image(x2, ui::Y_ICONS, id(img_clock), ImageAlign::TOP_CENTER, COLOR_ON);
          ui::print_time_centered(it, x2, ui::Y_ICONS + ui::Y_OFFSET_ICON_SUB_ROW1,  font_small, t.hour, t.minute);

      - id: page_auto_preview
        lambda: |-
          using esphome::display::COLOR_ON;
          using esphome::display::ImageAlign;

          auto font_small = id(f08_lucidasans_regular);

          ui::draw_header_2icons(it, id(img_auto), id(img_wrench));
          ui::draw_hints_pair(it, id(img_turn_small), "back", id(img_push_small), "edit", font_small);

          const int x0 = ui::right_icon_x(0);
          const int x1 = ui::right_icon_x(1);
          const int x2 = ui::right_icon_x(2);

          auto td = id(cfg_auto_time_day).state_as_esptime();
          auto tn = id(cfg_auto_time_night).state_as_esptime();

          ui::draw_icon_and_value(it, x0, ui::Y_ICONS, id(img_light_on), font_small,
                                  (int) id(cfg_brightness_auto_day).state,
                                  (int) id(cfg_brightness_auto_night).state);
          ui::draw_icon_and_value(it, x1, ui::Y_ICONS, id(img_fan_on), font_small,
                                  (int) id(cfg_fan_auto_day).state,
                                  (int) id(cfg_fan_auto_night).state);

          it.image(x2, ui::Y_ICONS, id(img_clock), ImageAlign::TOP_CENTER, COLOR_ON);
          ui::print_time_centered(it, x2, ui::Y_ICONS + ui::Y_OFFSET_ICON_SUB_ROW1, font_small, td.hour, td.minute);
          ui::print_time_centered(it, x2, ui::Y_ICONS + ui::Y_OFFSET_ICON_SUB_ROW2, font_small, tn.hour, tn.minute);

          it.image(0, ui::H - ui::ICON - 19, id(img_sun), COLOR_ON);
          it.image(0, ui::H - ui::ICON,      id(img_moon), COLOR_ON);

      - id: page_manual
        lambda: |-
          auto font_big    = id(f10_lucidasans_bold);
          auto font_value  = id(f10_lucidasans_regular);
          auto font_small  = id(f08_lucidasans_regular);
          auto font_tiny  = id(f06_u8g2_squeezed);
          using esphome::display::COLOR_ON;
          using esphome::display::TextAlign;
          if (id(focus_manual).state == "idle") {
            ui::draw_mode_header_2icons_title_wifi(it, font_big, "MANUAL", id(img_manual));
            if (!ui::draw_focus_sensors(it, font_value, font_small, font_tiny)) {
              const int x3 = ui::right_icon_x(3);
              ui::draw_icon_and_text(it, x3, ui::Y_ICONS, id(img_wind),   font_small, "xxx");
              it.printf(x3 - ui::X_OFFSET_ICONS/2, ui::Y_ICONS, font_tiny, COLOR_ON, TextAlign::TOP_LEFT, "UNIMPLEMENTED");
            }
          } else {
            ui::draw_header_2icons(it, id(img_manual), id(img_wrench));
            ui::draw_hints_pair(it, id(img_turn_small), "edit", id(img_push_small), "next", font_small);

            const int marker_y = ui::Y_ICONS + 1;
            int focus_idx = ui::focus_index_from_state(id(focus_manual).state.c_str());
            ui::draw_focus_marker(it, focus_idx, marker_y, id(img_arrow_right));
            ui::draw_focus_desc_manual(it, font_small, focus_idx);
          }

          // Right-side icons
          const int x0 = ui::right_icon_x(0);
          const int x1 = ui::right_icon_x(1);
          
          const int bright = id(cfg_brightness_manual).state;
          const int speed  = id(cfg_fan_manual).state;
          
          ui::draw_icon_and_value(it, x0, ui::Y_ICONS, id(img_light_on), font_small, bright);
          ui::draw_icon_and_value(it, x1, ui::Y_ICONS, id(img_fan_on),   font_small, speed);

      - id: page_off
        lambda: |-
          auto font_big = id(f10_lucidasans_bold);
          auto font_tiny = id(f06_u8g2_squeezed);
          ui::draw_mode_header_2icons_title_wifi(it, font_big, "OFF", id(img_off));

          std::string http_url;
          if (ui::get_device_http_url(http_url)) {
              it.printf(0, 64, font_tiny, COLOR_ON, TextAlign::BOTTOM_LEFT, "%s", http_url.c_str());
              ui::draw_qr_code(it, id(device_ip_qr_code), http_url, false);
          } else {
              if (id(network_offline_mode)) {
                it.printf(0, 64, font_tiny, COLOR_ON, TextAlign::BOTTOM_LEFT, "Wi-Fi off");
              } else {
                it.printf(0, 64, font_tiny, COLOR_ON, TextAlign::BOTTOM_LEFT, "no Wi-Fi");
              }
          }

      - id: page_init
        lambda: |-
          using esphome::display::COLOR_ON;
          using esphome::display::TextAlign;

          auto font_big = id(f10_lucidasans_bold);
          auto font_small = id(f08_lucidasans_regular);
          auto font_tiny = id(f06_u8g2_squeezed);

          if (id(network_hotspot_active)) {
            const char *instructions_url = "https://thecrbox.github.io/docs/trampoline/";
            const int text_x = 0;
            int info_y = ui::Y_OFFSET_ICON_SUB_ROW1;

            ui::draw_mode_header_2icons_title(it, font_big, "HELLO", id(img_turn));
            ui::draw_qr_code(it, id(device_ip_qr_code), instructions_url);

            it.printf(text_x, info_y, font_small, COLOR_ON, TextAlign::TOP_LEFT, "Scan to");
            info_y += 15;
            it.printf(text_x, info_y, font_small, COLOR_ON, TextAlign::TOP_LEFT, "configure");
            info_y += 15;
          } else if (id(network_offline_mode)) {
            const int text_x = 0;
            int info_y = ui::Y_OFFSET_ICON_SUB_ROW1;

            ui::draw_mode_header_2icons_title_wifi(it, font_big, "OFFLINE MODE", id(img_turn));

            it.printf(text_x, info_y, font_small, COLOR_ON, TextAlign::TOP_LEFT, "Wi-Fi disabled");
            info_y += 15;
            it.printf(0, 64, font_tiny, COLOR_ON, TextAlign::BOTTOM_LEFT, "will work offline");
          } else {
            ui::draw_mode_header_2icons_title_wifi(it, font_big, "CONNECTED", id(img_turn));

            const int text_x = 0;
            int info_y = ui::Y_OFFSET_ICON_SUB_ROW1;
            it.printf(text_x, info_y, font_tiny, COLOR_ON, TextAlign::TOP_LEFT, "will restart soon...");
            info_y += 8;

            std::string http_url;
            if (ui::get_device_http_url(http_url)) {
              it.printf(0, 64, font_tiny, COLOR_ON, TextAlign::BOTTOM_LEFT, "%s", http_url.c_str());
            }
          }

        
          
      
