      - id: page_init
        lambda: |-
          using esphome::display::COLOR_ON;
          using esphome::display::TextAlign;

          auto font_big = id(f10_lucidasans_bold);
          auto font_small = id(f08_lucidasans_regular);
          auto font_tiny = id(f06_u8g2_squeezed);

          if (id(network_hotspot_active)) {
            static constexpr uint32_t STEP_DELAY_MS = 2000U;
            const uint32_t now = esphome::millis();

            if (id(ui_setup_step_last_change_ms) == 0U) {
              id(ui_setup_step_last_change_ms) = now;
              id(ui_setup_step_state) = 0;
              id(ui_setup_step_cycle_count) = 0;
              id(ui_setup_step_interactive) = false;
            }

            if (!id(ui_setup_step_interactive)) {
              if (now - id(ui_setup_step_last_change_ms) >= STEP_DELAY_MS) {
                id(ui_setup_step_last_change_ms) = now;
                if (id(ui_setup_step_state) == 0) {
                  id(ui_setup_step_state) = 1;
                } else {
                  id(ui_setup_step_state) = 0;
                  id(ui_setup_step_cycle_count) += 1;
                  if (id(ui_setup_step_cycle_count) >= 2) {
                    id(ui_setup_step_interactive) = true;
                  }
                }
              }
            }

            const bool show_step2 = (id(ui_setup_step_state) == 1);

            const char *setup_ssid = "${device_setup_ssid}";
            const char *captive_portal_url = "http://192.168.4.1";
            const int text_x = 0;
            int info_y = ui::Y_OFFSET_ICON_SUB_ROW1;

            if (show_step2) {
              ui::draw_mode_header_no_wifi(it, font_big, "STEP 2", id(img_turn));

              it.printf(text_x, info_y, font_small, COLOR_ON, TextAlign::TOP_LEFT, "Open portal");
              info_y += 15;
              it.printf(text_x, info_y, font_tiny, COLOR_ON, TextAlign::TOP_LEFT, "visit");
              info_y += 9;
              it.printf(text_x, info_y, font_tiny, COLOR_ON, TextAlign::TOP_LEFT, "%s", captive_portal_url);
              info_y = 64-8;
              it.printf(text_x, info_y, font_tiny, COLOR_ON, TextAlign::TOP_LEFT, "scan QR to open");

              ui::draw_qr_code(it, id(device_ip_qr_code), captive_portal_url);
            } else {
              ui::draw_mode_header_no_wifi(it, font_big, "STEP 1", id(img_turn));

              it.printf(text_x, info_y, font_small, COLOR_ON, TextAlign::TOP_LEFT, "Join hotspot");
              info_y += 15;
              it.printf(text_x, info_y, font_tiny, COLOR_ON, TextAlign::TOP_LEFT, "%s", setup_ssid);
              info_y = 64-8;
              it.printf(text_x, info_y, font_tiny, COLOR_ON, TextAlign::TOP_LEFT, "scan QR to connect");

              ui::draw_qr_code(it, id(provisioning_qr_code));
            }

            if (id(ui_setup_step_interactive)) {
              const char *hint_label = show_step2 ? "prev" : "next";
              ui::draw_hint(it, ui::HINT_X_RIGHT + 9, id(img_turn_small), font_small, hint_label);
            }
          } else {
            id(ui_setup_step_last_change_ms) = 0;
            id(ui_setup_step_cycle_count) = 0;
            id(ui_setup_step_interactive) = false;
            id(ui_setup_step_state) = 0;
            ui::draw_mode_header(it, font_big, "CONNECTED", id(img_turn));

            const int text_x = 0;
            int info_y = ui::Y_OFFSET_ICON_SUB_ROW1;
            it.printf(text_x, info_y, font_tiny, COLOR_ON, TextAlign::TOP_LEFT, "will restart soon...");
            info_y += 8;

            if (esphome::wifi::global_wifi_component != nullptr) {
              auto addresses = esphome::wifi::global_wifi_component->get_ip_addresses();
              for (auto &ip : addresses) {
                  if (ip.is_set() && ip.is_ip4()) {
                      it.printf(0, 64, font_tiny, COLOR_ON, TextAlign::BOTTOM_LEFT, "http://%s", ip.str().c_str());
                      break;
                  }
              }
            }
          }

        
          
      
