  - platform: partition
    default_transition_length: 0s
    name: "RGB All"
    id: all_fans_rgb
    device_id: device_interface
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_group_id: sorting_group_interface
    # include each strip in one big addressable light
    segments:
      - id: rgb1
        from: 0
        to: 29     # Fan1 ring

    effects:
      - addressable_lambda:
          name: "PM2.5 Boot Sweep"
          update_interval: 150ms
          lambda: |-
            float speed  = (id(fans_speed).state ? (id(fans_speed).speed) : (0)) / 100.0f;
            thebox_light_effects::pm25_boot_sweep(it, speed);

      - addressable_lambda:
          name: "PM2.5 State"
          update_interval: 33ms
          lambda: |-
            float pm25 = id(sensor_pm_2_5).state;
            float speed  = (id(fans_speed).state ? (id(fans_speed).speed) : (0)) / 100.0f;
            thebox_light_effects::pm25_state(it, pm25, speed);


interval:
  - interval: 100ms
    then:
      - lambda: |-
          using std::isnan;
          const bool pm25_available = id(sensor_pm_2_5).has_state() && !isnan(id(sensor_pm_2_5).state);
          const bool show_boot_animation = !pm25_available && id(cfg_rgb_boot_animation).state;
          const char *const effect_state = "PM2.5 State";
          const char *const effect_boot = "PM2.5 Boot Sweep";

          if (id(purifier_mode).state == "MANUAL") {
            // just set to manual brightness
            const float brightness = id(cfg_brightness_manual).state / 100.0f;
            if (pm25_available) {
              id(all_fans_rgb).turn_on().set_effect(effect_state).set_brightness(brightness).perform();
            } else if (show_boot_animation) {
              id(all_fans_rgb).turn_on().set_effect(effect_boot).set_brightness(brightness).perform();
            } else {
              id(all_fans_rgb).turn_off().set_brightness(0.0f).perform();
            }
          } else if (id(purifier_mode).state == "AUTO") {
            auto td = id(cfg_auto_time_day).state_as_esptime();
            auto tn = id(cfg_auto_time_night).state_as_esptime();
            auto t = id(mysntp).now();
            
            bool day_mode = true;
            if (td.hour < tn.hour || (td.hour == tn.hour && td.minute < tn.minute)) {
              // normal case: day starts before night
              day_mode = (t.hour > td.hour || (t.hour == td.hour && t.minute >= td.minute)) &&
                         (t.hour < tn.hour || (t.hour == tn.hour && t.minute < tn.minute));
            } else {
              // special case: day starts after night (overnight)
              day_mode = (t.hour > td.hour || (t.hour == td.hour && t.minute >= td.minute)) ||
                         (t.hour < tn.hour || (t.hour == tn.hour && t.minute < tn.minute));
            }
          
            float brightness = 0.0f;
            if (day_mode) {
              brightness = id(cfg_brightness_auto_day).state / 100.0f;
            } else {
              brightness = id(cfg_brightness_auto_night).state / 100.0f;
            }
            if (pm25_available) {
              id(all_fans_rgb).turn_on().set_effect(effect_state).set_brightness(brightness).perform();
            } else if (show_boot_animation) {
              id(all_fans_rgb).turn_on().set_effect(effect_boot).set_brightness(brightness).perform();
            } else {
              id(all_fans_rgb).turn_off().set_brightness(0.0f).perform();
            }
          } else {
            // some other state; off?
            id(all_fans_rgb).turn_off().set_brightness(0.0f).perform();
          }
          

