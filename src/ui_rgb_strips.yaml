esphome:
  includes:
    - src/ui_rgb_pm25fx_common.h
    - src/ui_rgb_strips_pm25fx.h

number:
  - platform: template
    name: "MANUAL: brightness"
    id: cfg_brightness_manual
    device_id: device_interface
    web_server:
      sorting_group_id: sorting_group_interface_config_manual
    entity_category: "config"
    unit_of_measurement: "%"
    icon: "mdi:brightness-percent"
    optimistic: true
    restore_value: true
    min_value: 0.0
    max_value: 100.0
    initial_value: 100
    step: 1.0
  - platform: template
    name: "AUTO: brightness NIGHT"
    id: cfg_brightness_auto_night
    device_id: device_interface
    web_server:
      sorting_group_id: sorting_group_interface_config_auto
    entity_category: "config"
    unit_of_measurement: "%"
    icon: "mdi:brightness-percent"
    optimistic: true
    min_value: 0.0
    max_value: 100.0
    initial_value: 25
    step: 1.0
    restore_value: true
  - platform: template
    name: "AUTO: brightness DAY"
    id: cfg_brightness_auto_day
    device_id: device_interface
    web_server:
      sorting_group_id: sorting_group_interface_config_auto
    entity_category: "config"
    unit_of_measurement: "%"
    icon: "mdi:brightness-percent"
    optimistic: true
    min_value: 0.0
    max_value: 100.0
    initial_value: 100
    step: 1.0
    restore_value: true

switch:
  - platform: template
    name: "RGB Boot Animation"
    id: cfg_rgb_boot_animation
    device_id: device_interface
    entity_category: "config"
    icon: "mdi:movie-play"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    web_server:
      sorting_group_id: sorting_group_interface
    turn_on_action:
      - switch.template.publish:
          id: cfg_rgb_boot_animation
          state: ON
    turn_off_action:
      - switch.template.publish:
          id: cfg_rgb_boot_animation
          state: OFF

light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    pin: GPIO32
    num_leds: 30
    max_refresh_rate: 200ms
    # ESP32 classic uses 64-symbol memory blocks (512 total across 8 channels)
    # to avoid per-channel fragmentation. Reserve exactly one block per strip.
    #rmt_symbols: 128
    # false to force internal RAM allocation even if you have the the PSRAM component enabled. This can be useful if you’re experiencing issues like flickering with your leds strip
    use_psram: false
    rgb_order: GRB
    name: "RGB 1"
    id: rgb1
    device_id: device_interface
    default_transition_length: 0s
    internal: true
