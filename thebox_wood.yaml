packages:
  - !include {
      file: thebox_base.yaml,
      vars: {
        device_name: "box2-0004",
        UI_DISPLAY_TYPE: "sh1106 128x64"
      }
    }
  - !include
    file: src/display_normal.yaml
  - !include
    file: src/sensor_pmsx0003.yaml
  - !include
    file: src/sensor_sen5x.yaml

wifi:
  id: mywifi
#  ssid:  !secret wifi_ssid
#  password: !secret wifi_password

api:
  id: myapi
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    id: myota
    password: !secret ota_pass
